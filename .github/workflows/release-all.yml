name: release-all

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.0.9)"
        required: true
        type: string
      ref:
        description: "Git ref/branch/sha to build"
        required: false
        default: "main"
        type: string
      run_verify:
        description: "Run quality gate before building artifacts"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Release channel override (auto/true/false)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - true
          - false

permissions:
  contents: write

env:
  TAURI_CLI_VERSION: 2.9.6

concurrency:
  group: ${{ format('{0}-tag-{1}', github.workflow, startsWith(github.event.inputs.tag, 'v') && github.event.inputs.tag || format('v{0}', github.event.inputs.tag)) }}
  cancel-in-progress: false

jobs:
  verify:
    if: ${{ github.event.inputs.run_verify != 'false' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-all-platforms-rust-stable-v1
          workspaces: |
            . -> target
            apps/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: apps
        run: pnpm install --frozen-lockfile

      - name: Rust tests
        run: cargo test --workspace

      - name: Frontend unit tests
        working-directory: apps
        run: pnpm run test

      - name: Frontend structure tests
        working-directory: apps
        run: pnpm run test:ui

      - name: Frontend build
        working-directory: apps
        run: pnpm run build

      - name: Pack frontend dist artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/dist/index.html || { echo "apps/dist/index.html not found"; exit 1; }
          rm -f frontend-dist.tar.gz
          tar -czf frontend-dist.tar.gz -C apps dist

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-frontend-dist
          path: frontend-dist.tar.gz
          if-no-files-found: error
          compression-level: 0

  build_windows:
    needs: verify
    if: ${{ always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Validate tag/version consistency
        shell: pwsh
        run: |
          $tagInput = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tagInput)) { throw "release tag is required" }

          $normalizedTag = if ($tagInput.StartsWith("v")) { $tagInput } else { "v$tagInput" }
          if ($normalizedTag -notmatch '^v(\d+\.\d+\.\d+)(?:[-+].*)?$') {
            throw "tag must look like vX.Y.Z or vX.Y.Z-suffix, got: $normalizedTag"
          }
          $tagVersion = $Matches[1]

          $cargoToml = Get-Content 'apps/src-tauri/Cargo.toml' -Raw
          if ($cargoToml -notmatch '(?ms)\[package\].*?^\s*version\s*=\s*"([^"]+)"') {
            throw "failed to read [package].version from apps/src-tauri/Cargo.toml"
          }
          $cargoVersion = $Matches[1]

          $tauriConf = (Get-Content 'apps/src-tauri/tauri.conf.json' -Raw) | ConvertFrom-Json
          $tauriVersion = $tauriConf.version

          if ([string]::IsNullOrWhiteSpace($tauriVersion)) { throw "tauri.conf.json missing version" }

          if ($cargoVersion -ne $tauriVersion) {
            throw "version mismatch: apps/src-tauri/Cargo.toml=$cargoVersion apps/src-tauri/tauri.conf.json=$tauriVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "tag/version mismatch: tag=$normalizedTag expects $tagVersion, but app version is $cargoVersion"
          }

          Write-Host "Version OK: $cargoVersion (tag $normalizedTag)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-all-platforms-rust-stable-v1
          workspaces: |
            . -> target
            apps/src-tauri -> target

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: codexmanager-frontend-dist
          path: .

      - name: Restore prebuilt frontend dist
        shell: pwsh
        run: |
          if (Test-Path "apps/dist") {
            Remove-Item -Recurse -Force "apps/dist"
          }
          tar -xzf frontend-dist.tar.gz -C apps
          if (-not (Test-Path "apps/dist/index.html" -PathType Leaf)) {
            throw "prebuilt frontend dist restore failed: apps/dist/index.html not found"
          }

      - name: Disable redundant frontend rebuild for Tauri bundle
        shell: pwsh
        run: |
          $configPath = "apps/src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.build) {
            throw "tauri.conf.json missing build section"
          }
          $config.build.PSObject.Properties.Remove("beforeBuildCommand")
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath

      - name: Build Tauri bundle (with retry)
        working-directory: apps
        shell: pwsh
        run: |
          $maxAttempts = 3
          $attempt = 0
          $succeeded = $false
          while ($attempt -lt $maxAttempts -and -not $succeeded) {
            $attempt++
            Write-Host "Build attempt $attempt/$maxAttempts ..."
            pnpm dlx @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --bundles nsis
            if ($LASTEXITCODE -eq 0) {
              $succeeded = $true
              break
            }
            if ($attempt -lt $maxAttempts) {
              $delay = 20 * $attempt
              Write-Warning "Build failed on attempt $attempt, retrying in $delay seconds..."
              Start-Sleep -Seconds $delay
            }
          }
          if (-not $succeeded) {
            throw "Build failed after $maxAttempts attempts."
          }

      - name: Stage portable package
        shell: pwsh
        run: |
          $releaseDir = "apps/src-tauri/target/release"
          $portableDir = Join-Path $releaseDir "portable"
          New-Item -ItemType Directory -Force $portableDir | Out-Null

          $source = Join-Path $releaseDir "CodexManager.exe"
          if (-not (Test-Path $source -PathType Leaf)) {
            throw "portable source binary not found: $source"
          }

          $portableBinary = Join-Path $portableDir "CodexManager-portable.exe"
          Copy-Item -Force $source $portableBinary
          Write-Host "portable binary: $portableBinary"

          $legacyZip = Join-Path $portableDir "CodexManager-windows-portable.zip"
          if (Test-Path $legacyZip) {
            Remove-Item -Force $legacyZip
          }
          Compress-Archive -Path $portableBinary -DestinationPath $legacyZip
          Write-Host "legacy portable zip: $legacyZip"

      - name: Build service binaries
        shell: pwsh
        run: |
          cargo build -p codexmanager-service --release
          cargo build -p codexmanager-web --release --features embedded-ui
          cargo build -p codexmanager-start --release

      - name: Stage service package
        shell: pwsh
        run: |
          $arch = "${{ runner.arch }}"
          $archSlug = switch ($arch) {
            "X64" { "x86_64" }
            "ARM64" { "arm64" }
            Default { $arch.ToLowerInvariant() }
          }

          $stageRoot = "stage"
          $pkgName = "CodexManager-service-windows-$archSlug"
          $pkgDir = Join-Path $stageRoot $pkgName

          Remove-Item -Recurse -Force $pkgDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $pkgDir | Out-Null

          $serviceBin = "target/release/codexmanager-service.exe"
          if (-not (Test-Path $serviceBin -PathType Leaf)) { throw "service binary not found: $serviceBin" }
          Copy-Item -Force $serviceBin (Join-Path $pkgDir "codexmanager-service.exe")

          $webBin = "target/release/codexmanager-web.exe"
          if (-not (Test-Path $webBin -PathType Leaf)) { throw "web binary not found: $webBin" }
          Copy-Item -Force $webBin (Join-Path $pkgDir "codexmanager-web.exe")

          $startBin = "target/release/codexmanager-start.exe"
          if (-not (Test-Path $startBin -PathType Leaf)) { throw "start binary not found: $startBin" }
          Copy-Item -Force $startBin (Join-Path $pkgDir "codexmanager-start.exe")

          $zipPath = Join-Path $stageRoot "$pkgName.zip"
          if (Test-Path $zipPath) { Remove-Item -Force $zipPath }
          Compress-Archive -Path $pkgDir -DestinationPath $zipPath
          Write-Host "service package: $zipPath"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-windows
          path: |
            apps/src-tauri/target/release/bundle/**/*.exe
            apps/src-tauri/target/release/portable/*.exe
            apps/src-tauri/target/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-service-windows
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_macos_beta:
    needs: verify
    if: ${{ always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            rust_target: aarch64-apple-darwin
          - arch: x64
            rust_target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Validate tag/version consistency
        shell: pwsh
        run: |
          $tagInput = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tagInput)) { throw "release tag is required" }

          $normalizedTag = if ($tagInput.StartsWith("v")) { $tagInput } else { "v$tagInput" }
          if ($normalizedTag -notmatch '^v(\d+\.\d+\.\d+)(?:[-+].*)?$') {
            throw "tag must look like vX.Y.Z or vX.Y.Z-suffix, got: $normalizedTag"
          }
          $tagVersion = $Matches[1]

          $cargoToml = Get-Content 'apps/src-tauri/Cargo.toml' -Raw
          if ($cargoToml -notmatch '(?ms)\[package\].*?^\s*version\s*=\s*"([^"]+)"') {
            throw "failed to read [package].version from apps/src-tauri/Cargo.toml"
          }
          $cargoVersion = $Matches[1]

          $tauriConf = (Get-Content 'apps/src-tauri/tauri.conf.json' -Raw) | ConvertFrom-Json
          $tauriVersion = $tauriConf.version

          if ([string]::IsNullOrWhiteSpace($tauriVersion)) { throw "tauri.conf.json missing version" }

          if ($cargoVersion -ne $tauriVersion) {
            throw "version mismatch: apps/src-tauri/Cargo.toml=$cargoVersion apps/src-tauri/tauri.conf.json=$tauriVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "tag/version mismatch: tag=$normalizedTag expects $tagVersion, but app version is $cargoVersion"
          }

          Write-Host "Version OK: $cargoVersion (tag $normalizedTag)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-all-platforms-rust-stable-v1
          workspaces: |
            . -> target
            apps/src-tauri -> target

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: codexmanager-frontend-dist
          path: .

      - name: Restore prebuilt frontend dist
        shell: pwsh
        run: |
          if (Test-Path "apps/dist") {
            Remove-Item -Recurse -Force "apps/dist"
          }
          tar -xzf frontend-dist.tar.gz -C apps
          if (-not (Test-Path "apps/dist/index.html" -PathType Leaf)) {
            throw "prebuilt frontend dist restore failed: apps/dist/index.html not found"
          }

      - name: Disable redundant frontend rebuild for Tauri bundle
        shell: pwsh
        run: |
          $configPath = "apps/src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.build) {
            throw "tauri.conf.json missing build section"
          }
          $config.build.PSObject.Properties.Remove("beforeBuildCommand")
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath

      - name: Build macOS app bundle (dmg)
        working-directory: apps
        run: pnpm dlx @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --bundles dmg --target ${{ matrix.rust_target }}

      - name: Stage legacy macOS portable package
        if: ${{ matrix.arch == 'arm64' }}
        shell: bash
        run: |
          set -euo pipefail

          release_dir="apps/src-tauri/target/${{ matrix.rust_target }}/release"
          bundle_dir="${release_dir}/bundle/macos/CodexManager.app"
          test -d "$bundle_dir" || { echo "macOS app bundle not found: $bundle_dir"; exit 1; }

          portable_dir="${release_dir}/portable"
          mkdir -p "$portable_dir"

          zip_path="${portable_dir}/CodexManager-macos-portable.zip"
          rm -f "$zip_path"
          ditto -c -k --sequesterRsrc --keepParent "$bundle_dir" "$zip_path"
          echo "legacy portable zip: $zip_path"

      - name: Build service binaries
        run: |
          cargo build -p codexmanager-service --release --target ${{ matrix.rust_target }}
          cargo build -p codexmanager-web --release --features embedded-ui --target ${{ matrix.rust_target }}
          cargo build -p codexmanager-start --release --target ${{ matrix.rust_target }}

      - name: Stage service package
        shell: bash
        run: |
          set -euo pipefail

          stage_root="stage"
          pkg_name="CodexManager-service-macos-${{ matrix.arch }}"
          pkg_dir="${stage_root}/${pkg_name}"

          rm -rf "$pkg_dir"
          mkdir -p "$pkg_dir"

          release_dir="target/${{ matrix.rust_target }}/release"
          service_bin="$release_dir/codexmanager-service"
          web_bin="$release_dir/codexmanager-web"
          start_bin="$release_dir/codexmanager-start"
          test -f "$service_bin" || { echo "service binary not found: $service_bin"; exit 1; }
          test -f "$web_bin" || { echo "web binary not found: $web_bin"; exit 1; }
          test -f "$start_bin" || { echo "start binary not found: $start_bin"; exit 1; }

          cp -f "$service_bin" "$pkg_dir/codexmanager-service"
          cp -f "$web_bin" "$pkg_dir/codexmanager-web"
          cp -f "$start_bin" "$pkg_dir/codexmanager-start"
          chmod +x "$pkg_dir/codexmanager-service" "$pkg_dir/codexmanager-web" "$pkg_dir/codexmanager-start"

          zip_path="${stage_root}/${pkg_name}.zip"
          rm -f "$zip_path"
          ditto -c -k --sequesterRsrc --keepParent "$pkg_dir" "$zip_path"
          echo "service package: $zip_path"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-macos-${{ matrix.arch }}
          path: |
            apps/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
            apps/src-tauri/target/${{ matrix.rust_target }}/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-service-macos-${{ matrix.arch }}
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  build_linux:
    needs: verify
    if: ${{ always() && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - name: Validate tag/version consistency
        shell: pwsh
        run: |
          $tagInput = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tagInput)) { throw "release tag is required" }

          $normalizedTag = if ($tagInput.StartsWith("v")) { $tagInput } else { "v$tagInput" }
          if ($normalizedTag -notmatch '^v(\d+\.\d+\.\d+)(?:[-+].*)?$') {
            throw "tag must look like vX.Y.Z or vX.Y.Z-suffix, got: $normalizedTag"
          }
          $tagVersion = $Matches[1]

          $cargoToml = Get-Content 'apps/src-tauri/Cargo.toml' -Raw
          if ($cargoToml -notmatch '(?ms)\[package\].*?^\s*version\s*=\s*"([^"]+)"') {
            throw "failed to read [package].version from apps/src-tauri/Cargo.toml"
          }
          $cargoVersion = $Matches[1]

          $tauriConf = (Get-Content 'apps/src-tauri/tauri.conf.json' -Raw) | ConvertFrom-Json
          $tauriVersion = $tauriConf.version

          if ([string]::IsNullOrWhiteSpace($tauriVersion)) { throw "tauri.conf.json missing version" }

          if ($cargoVersion -ne $tauriVersion) {
            throw "version mismatch: apps/src-tauri/Cargo.toml=$cargoVersion apps/src-tauri/tauri.conf.json=$tauriVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "tag/version mismatch: tag=$normalizedTag expects $tagVersion, but app version is $cargoVersion"
          }

          Write-Host "Version OK: $cargoVersion (tag $normalizedTag)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-all-platforms-rust-stable-v1
          workspaces: |
            . -> target
            apps/src-tauri -> target

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-jammy-tauri-${{ hashFiles('.github/workflows/release-all.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-jammy-tauri-

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev zip

      - name: Download prebuilt frontend dist
        uses: actions/download-artifact@v4
        with:
          name: codexmanager-frontend-dist
          path: .

      - name: Restore prebuilt frontend dist
        shell: pwsh
        run: |
          if (Test-Path "apps/dist") {
            Remove-Item -Recurse -Force "apps/dist"
          }
          tar -xzf frontend-dist.tar.gz -C apps
          if (-not (Test-Path "apps/dist/index.html" -PathType Leaf)) {
            throw "prebuilt frontend dist restore failed: apps/dist/index.html not found"
          }

      - name: Disable redundant frontend rebuild for Tauri bundle
        shell: pwsh
        run: |
          $configPath = "apps/src-tauri/tauri.conf.json"
          $config = Get-Content $configPath -Raw | ConvertFrom-Json
          if (-not $config.build) {
            throw "tauri.conf.json missing build section"
          }
          $config.build.PSObject.Properties.Remove("beforeBuildCommand")
          $config | ConvertTo-Json -Depth 100 | Set-Content $configPath

      - name: Build Tauri bundle (with retry)
        working-directory: apps
        shell: bash
        run: |
          max_attempts=3
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            echo "Build attempt $attempt/$max_attempts ..."
            if pnpm dlx @tauri-apps/cli@${{ env.TAURI_CLI_VERSION }} build --bundles appimage,deb; then
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              delay=$((20 * attempt))
              echo "Build failed on attempt $attempt, retry in ${delay}s..."
              sleep "$delay"
            fi
            attempt=$((attempt + 1))
          done
          echo "Build failed after $max_attempts attempts."
          exit 1

      - name: Stage portable package
        shell: bash
        run: |
          release_dir="apps/src-tauri/target/release"
          portable_dir="$release_dir/portable"
          mkdir -p "$portable_dir"

          source_bin="$release_dir/CodexManager"
          if [[ ! -f "$source_bin" ]]; then
            echo "portable source binary not found: $source_bin"
            exit 1
          fi

          portable_bin="$portable_dir/CodexManager-portable"
          cp -f "$source_bin" "$portable_bin"
          chmod +x "$portable_bin"

          zip_path="$portable_dir/CodexManager-linux-portable.zip"
          rm -f "$zip_path"
          (
            cd "$portable_dir"
            zip -q "CodexManager-linux-portable.zip" "CodexManager-portable"
          )
          echo "portable package: $zip_path"

      - name: Build service binaries
        run: |
          cargo build -p codexmanager-service --release
          cargo build -p codexmanager-web --release --features embedded-ui
          cargo build -p codexmanager-start --release

      - name: Stage service package
        shell: bash
        run: |
          set -euo pipefail

          arch="$(uname -m)"
          case "$arch" in
            x86_64) arch_slug="x86_64" ;;
            aarch64|arm64) arch_slug="arm64" ;;
            *) arch_slug="$arch" ;;
          esac

          stage_root="stage"
          pkg_name="CodexManager-service-linux-${arch_slug}"
          pkg_dir="${stage_root}/${pkg_name}"

          rm -rf "$pkg_dir"
          mkdir -p "$pkg_dir"

          service_bin="target/release/codexmanager-service"
          web_bin="target/release/codexmanager-web"
          start_bin="target/release/codexmanager-start"
          test -f "$service_bin" || { echo "service binary not found: $service_bin"; exit 1; }
          test -f "$web_bin" || { echo "web binary not found: $web_bin"; exit 1; }
          test -f "$start_bin" || { echo "start binary not found: $start_bin"; exit 1; }

          cp -f "$service_bin" "$pkg_dir/codexmanager-service"
          cp -f "$web_bin" "$pkg_dir/codexmanager-web"
          cp -f "$start_bin" "$pkg_dir/codexmanager-start"
          chmod +x "$pkg_dir/codexmanager-service" "$pkg_dir/codexmanager-web" "$pkg_dir/codexmanager-start"

          mkdir -p "$stage_root"
          (cd "$stage_root" && zip -q -r "${pkg_name}.zip" "${pkg_name}")
          echo "service package: ${stage_root}/${pkg_name}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-linux
          path: |
            apps/src-tauri/target/release/bundle/**/*.AppImage
            apps/src-tauri/target/release/bundle/**/*.deb
            apps/src-tauri/target/release/portable/*.zip
          if-no-files-found: error
          compression-level: 0

      - name: Upload service artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codexmanager-service-linux
          path: stage/*.zip
          if-no-files-found: error
          compression-level: 0

  release:
    needs: [build_windows, build_macos_beta, build_linux]
    if: ${{ needs.build_windows.result == 'success' && needs.build_macos_beta.result == 'success' && needs.build_linux.result == 'success' }}
    runs-on: ubuntu-22.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codexmanager-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Resolve release meta
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          REF="${{ github.event.inputs.ref || 'main' }}"
          PRERELEASE_INPUT="${{ github.event.inputs.prerelease || 'auto' }}"

          if [[ -z "$TAG" ]]; then
            echo "release tag is required"
            exit 1
          fi
          if [[ "$TAG" != v* ]]; then
            TAG="v$TAG"
          fi

          TARGET_SHA="$(gh api "repos/$GH_REPO/commits/$REF" --jq .sha)"
          if [[ -z "$TARGET_SHA" ]]; then
            echo "failed to resolve ref to commit: $REF"
            exit 1
          fi

          # Manual override wins; "auto" falls back to prerelease tags.
          case "$PRERELEASE_INPUT" in
            true|false)
              PRERELEASE="$PRERELEASE_INPUT"
              ;;
            auto)
              if [[ "$TAG" == *-* ]]; then
                PRERELEASE="true"
              else
                PRERELEASE="false"
              fi
              ;;
            *)
              echo "invalid prerelease input: $PRERELEASE_INPUT"
              exit 1
              ;;
          esac

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TARGET_SHA="${{ steps.meta.outputs.target_sha }}"
          TITLE="CodexManager $TAG"

          mapfile -t FILES < <(find release-assets -type f \( \
            -name '*.exe' -o -name '*.zip' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
          \) | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GH_REPO" --title "$TITLE" --target "$TARGET_SHA"
            gh release upload "$TAG" "${FILES[@]}" --repo "$GH_REPO" --clobber
          else
            CREATE_ARGS=(--repo "$GH_REPO" --title "$TITLE" --target "$TARGET_SHA" --generate-notes)
            if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
              CREATE_ARGS+=(--prerelease)
            fi
            # Multi-platform runs can race on the same tag; fallback to edit+upload when create fails.
            if ! gh release create "$TAG" "${FILES[@]}" "${CREATE_ARGS[@]}"; then
              echo "release create failed, retrying as edit+upload..."
              gh release edit "$TAG" --repo "$GH_REPO" --title "$TITLE" --target "$TARGET_SHA"
              gh release upload "$TAG" "${FILES[@]}" --repo "$GH_REPO" --clobber
            fi
          fi
